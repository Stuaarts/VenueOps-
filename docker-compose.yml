services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: venueops
      POSTGRES_USER: venueops
      POSTGRES_PASSWORD: venueops_dev_password
    ports:
      - "5432:5432"
    volumes:
      - venueops-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U venueops -d venueops"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=venueops;Username=venueops;Password=venueops_dev_password
      Jwt__Issuer: VenueOps
      Jwt__Audience: VenueOpsClient
      Jwt__SigningKey: dev-only-change-this-venueops-signing-key-32-plus-chars
      Cors__AllowedOrigins__0: http://localhost:8080
      Cors__AllowedOrigins__1: http://localhost:5173
      SeedDemoData: "true"
    ports:
      - "5000:8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:5000/api
        VITE_USE_MOCKS: "false"
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  venueops-postgres:
